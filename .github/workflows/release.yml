name: Package and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package and upload to CurseForge / GitHub release
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CURSE_FORGE_API_FOR_TEXT_WOW }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
